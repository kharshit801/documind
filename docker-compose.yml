services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: documind-backend:dev
    container_name: documind-backend
    env_file:
      - .env
    environment:
      APP_ENV: development
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: documind-frontend:dev
    container_name: documind-frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
