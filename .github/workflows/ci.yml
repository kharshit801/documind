name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  backend:
    name: Backend (lint + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint (flake8)
        run: flake8 app

      - name: Run tests
        env:
          # Tests must not hit live OpenAI / Pinecone — all clients are
          # monkey-patched. We still set placeholder env so config validation
          # passes if any code path constructs Settings() lazily.
          OPENAI_API_KEY: test-openai-key
          PINECONE_API_KEY: test-pinecone-key
          PINECONE_INDEX_NAME: documind-test
          APP_ENV: development
        run: pytest -q

  frontend:
    name: Frontend (build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package.json

      - name: Install dependencies
        run: npm install

      - name: Build
        env:
          VITE_API_BASE_URL: http://localhost:8000
        run: npm run build
